services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: typeahead
      POSTGRES_USER: typeahead
      POSTGRES_PASSWORD: typeahead
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U typeahead -d typeahead"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis-node-1:
    image: redis:7
    ports:
      - "6379:6379"

  redis-node-2:
    image: redis:7
    ports:
      - "6380:6379"

  redis-node-3:
    image: redis:7
    ports:
      - "6381:6379"

  database-loader:
    build: ./database-loader
    environment:
      - DB_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      database-loader:
        condition: service_completed_successfully
      redis-node-1:
        condition: service_started
      redis-node-2:
        condition: service_started
      redis-node-3:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/typeahead
      SPRING_DATASOURCE_USERNAME: typeahead
      SPRING_DATASOURCE_PASSWORD: typeahead
      APP_REDIS_NODES: redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
      JAVA_TOOL_OPTIONS: "-Xmx5g"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_TARGET: http://backend:8080

  welcome-message:
    image: alpine
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    command: >
      sh -c "
      sleep 5;
      echo '';
      echo '==================================================';
      echo '  🚀 SEARCH TYPEAHEAD SYSTEM IS READY!  ';
      echo '  👉 Access the frontend at: http://localhost:5173';
      echo '==================================================';
      echo '';
      "
